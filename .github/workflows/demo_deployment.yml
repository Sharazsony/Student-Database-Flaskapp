name: Demo Deployment

on:
  workflow_dispatch:

jobs:
  run-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: |
          docker compose up -d

      - name: Wait
        run: sleep 20

      - name: Test application
        run: |
          curl http://localhost:5000

      - name: Show URL
        run: |
          echo "Application available at:"
          echo "http://localhost:5000"
